services:
  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: file:/data/prod.db
      SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET in .env.production}"
    volumes:
      - ./data:/data
    expose:
      - "3000"
    init: true
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN in .env.production}"
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
